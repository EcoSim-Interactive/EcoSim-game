name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  backend-lint-and-test:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: simulatorV1/python_backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v5
        
      - name: Setup Python
        run: uv python install 3.12

      - name: Install Python Dependencies
        run: uv sync

      - name: Check Format (Ruff)
        run: uv run ruff format --check .

      - name: Lint (Ruff)
        run: uv run ruff check .

      - name: Run Tests (Unittest)
        run: uv run python -m unittest discover tests

  site-vitrine-lint:
    name: Site Vitrine Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site-vitrine 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Lint Frontend
        run: npm run lint

  build:
    name: Build for ${{ matrix.os }}
    needs: [backend-lint-and-test, site-vitrine-lint]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: EcoSim-Windows
          - os: ubuntu-latest
            artifact_name: EcoSim-Linux
          - os: macos-latest
            artifact_name: EcoSim-macOS

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v5
        
      - name: Setup Python
        run: uv python install 3.12

      - name: Install Python Dependencies
        run: |
          cd simulatorV1/python_backend
          uv sync
          uv add pyinstaller

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.2
          use-dotnet: false
          include-templates: true

      - name: Run Build Script
        shell: bash
        run: |
          cd simulatorV1
          uv run python build.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: simulatorV1/dist_final/

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Zip Artifacts
        run: |
          cd artifacts
          zip -r EcoSim-Windows.zip EcoSim-Windows
          zip -r EcoSim-Linux.zip EcoSim-Linux
          zip -r EcoSim-macOS.zip EcoSim-macOS

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true